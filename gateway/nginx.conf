events { worker_connections 1024; }

http {
    upstream auth_service      { server auth-service:8001; }
    upstream course_service    { server course-service:8002; }
    upstream assignment_service { server assignment-service:8003; }
    upstream file_service      { server file-service:8004; }
    upstream llm_service       { server llm-service:8005; }
    upstream marks_service     { server marks-service:8006; }
    upstream notification_service { server notification-service:8007; }

    server {
        listen 80;

        # Increase body size for file uploads (20 MB)
        client_max_body_size 20M;

        location /api/auth/ {
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/courses/ {
            proxy_pass http://course_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/assignments/ {
            proxy_pass http://assignment_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/files/ {
            proxy_pass http://file_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/llm/ {
            proxy_pass http://llm_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # LLM calls can take a while
            proxy_read_timeout 120s;
        }

        location /api/marks/ {
            proxy_pass http://marks_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/notifications/ {
            proxy_pass http://notification_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
